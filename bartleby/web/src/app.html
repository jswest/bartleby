<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Bartleby</title>
    <!-- Fonts are self-hosted (see static/fonts/, @font-face in app.css). No
         external font requests: Google's Source Serif subset drops oldstyle
         figures and "Iosevka Term" isn't on a clean CDN. -->
    <link rel="preload" href="/fonts/IosevkaTerm-Regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/SourceSerif4-Variable.woff2" as="font" type="font/woff2" crossorigin />
    %sveltekit.head%
  </head>
  <body>
    <div>%sveltekit.body%</div>
  </body>
</html>
